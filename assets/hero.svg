<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1117"/>
      <stop offset="100%" style="stop-color:#1a1f2e"/>
    </linearGradient>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#77bc1f"/>
      <stop offset="100%" style="stop-color:#4a9a08"/>
    </linearGradient>
    <linearGradient id="tgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2aabee"/>
      <stop offset="100%" style="stop-color:#229ed9"/>
    </linearGradient>
    <linearGradient id="aiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="50" x2="1200" y2="50"/>
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="150" x2="1200" y2="150"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="250" x2="1200" y2="250"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="350" x2="1200" y2="350"/>
    <line x1="100" y1="0" x2="100" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="500" y1="0" x2="500" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="700" y1="0" x2="700" y2="400"/>
    <line x1="800" y1="0" x2="800" y2="400"/>
    <line x1="900" y1="0" x2="900" y2="400"/>
    <line x1="1000" y1="0" x2="1000" y2="400"/>
    <line x1="1100" y1="0" x2="1100" y2="400"/>
  </g>

  <!-- Glow orbs -->
  <circle cx="200" cy="200" r="160" fill="#77bc1f" opacity="0.05"/>
  <circle cx="600" cy="200" r="200" fill="#2aabee" opacity="0.04"/>
  <circle cx="1000" cy="200" r="160" fill="#a855f7" opacity="0.05"/>

  <!-- Left icon: Spring leaf -->
  <g transform="translate(170, 140)" filter="url(#glow)">
    <circle cx="60" cy="60" r="56" fill="#1a2a10" opacity="0.8"/>
    <circle cx="60" cy="60" r="56" fill="none" stroke="#77bc1f" stroke-width="1.5" opacity="0.6"/>
    <!-- Spring leaf shape -->
    <path d="M60 88 C60 88 28 72 28 44 C28 26 42 16 60 20 C60 20 52 36 60 52 C68 36 60 20 60 20 C78 16 92 26 92 44 C92 72 60 88 60 88Z" fill="url(#leafGrad)"/>
    <path d="M60 52 C60 52 44 60 44 76" stroke="#4a9a08" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.7"/>
  </g>

  <!-- Center icon: Telegram -->
  <g transform="translate(570, 130)" filter="url(#glow)">
    <circle cx="60" cy="70" r="60" fill="#0d2137" opacity="0.8"/>
    <circle cx="60" cy="70" r="60" fill="none" stroke="#2aabee" stroke-width="1.5" opacity="0.6"/>
    <!-- Telegram paper plane -->
    <path d="M20 67 L100 37 L76 103 L58 85 L42 93 Z" fill="url(#tgGrad)" opacity="0.9"/>
    <path d="M42 93 L58 85 L100 37" stroke="#0d2137" stroke-width="2" fill="none"/>
    <path d="M58 85 L52 105 L42 93" fill="#1a8bbf" opacity="0.8"/>
  </g>

  <!-- Right icon: AI / brain -->
  <g transform="translate(960, 140)" filter="url(#glow)">
    <circle cx="60" cy="60" r="56" fill="#1a0f2a" opacity="0.8"/>
    <circle cx="60" cy="60" r="56" fill="none" stroke="#a855f7" stroke-width="1.5" opacity="0.6"/>
    <!-- AI nodes -->
    <circle cx="60" cy="30" r="5" fill="#a855f7"/>
    <circle cx="35" cy="50" r="5" fill="#a855f7"/>
    <circle cx="85" cy="50" r="5" fill="#a855f7"/>
    <circle cx="35" cy="75" r="5" fill="#a855f7"/>
    <circle cx="85" cy="75" r="5" fill="#a855f7"/>
    <circle cx="60" cy="92" r="5" fill="#a855f7"/>
    <!-- Connections -->
    <g stroke="#a855f7" stroke-width="1.5" opacity="0.5">
      <line x1="60" y1="30" x2="35" y2="50"/>
      <line x1="60" y1="30" x2="85" y2="50"/>
      <line x1="35" y1="50" x2="85" y2="50"/>
      <line x1="35" y1="50" x2="35" y2="75"/>
      <line x1="85" y1="50" x2="85" y2="75"/>
      <line x1="35" y1="75" x2="85" y2="75"/>
      <line x1="35" y1="75" x2="60" y2="92"/>
      <line x1="85" y1="75" x2="60" y2="92"/>
      <line x1="35" y1="50" x2="60" y2="92"/>
      <line x1="85" y1="50" x2="60" y2="92"/>
    </g>
  </g>

  <!-- Connector lines between icons -->
  <g opacity="0.2" stroke-dasharray="6,4">
    <line x1="286" y1="200" x2="570" y2="200" stroke="#77bc1f" stroke-width="1.5"/>
    <line x1="690" y1="200" x2="960" y2="200" stroke="#2aabee" stroke-width="1.5"/>
  </g>

  <!-- Labels under icons -->
  <text x="230" y="330" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" fill="#77bc1f" opacity="0.9" letter-spacing="2">SPRING BOOT</text>
  <text x="630" y="330" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" fill="#2aabee" opacity="0.9" letter-spacing="2">TELEGRAM</text>
  <text x="1020" y="330" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" fill="#a855f7" opacity="0.9" letter-spacing="2">AI POWERED</text>

  <!-- Main title -->
  <text x="600" y="215" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="52" font-weight="700" fill="#ffffff" letter-spacing="-1" filter="url(#softglow)">Spring Bot</text>

  <!-- Tagline -->
  <text x="600" y="252" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="16" fill="#8892a4" letter-spacing="1">AI-powered Spring framework assistant for Telegram</text>

  <!-- Bottom border line -->
  <line x1="0" y1="395" x2="1200" y2="395" stroke="#ffffff" stroke-width="1" opacity="0.05"/>
</svg>
